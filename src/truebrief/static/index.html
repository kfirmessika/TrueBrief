<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Engine | TrueBrief</title>

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Deep Space Color Palette */
            --bg-midnight: #0b0d14;
            --surface-charcoal: #151821;
            --surface-hover: #1e222d;
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
            /* Glowing Accents */
            --accent-purple: #6c5ce7;
            --accent-cyan: #00cec9;
            --accent-cyan-glow: rgba(0, 206, 201, 0.15);
            --warning-orange: #e17055;

            /* Text */
            --text-primary: #ffffff;
            --text-secondary: #9aa0a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-midnight);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Left Sidebar (Control Center) --- */
        .sidebar {
            width: 320px;
            background: var(--surface-charcoal);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .brand {
            margin-bottom: 30px;
        }

        .brand h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .brand .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        /* Add Target Input */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .input-group input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-purple);
        }

        .scan-btn {
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .scan-btn:hover {
            background: #5b4cc4;
            transform: translateY(-1px);
        }
        .scan-btn:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
            transform: none;
        }

        /* Topics List */
        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        .topics-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px; /* Scrollbar spacing */
        }
        .topics-list::-webkit-scrollbar {
            width: 4px;
        }
        .topics-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .topic-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--glass-bg);
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            group: topic;
        }

        .topic-item:hover {
            background: var(--surface-hover);
            border-color: var(--glass-border);
        }

        .topic-item.active {
            background: var(--accent-cyan-glow);
            border-color: var(--accent-cyan);
        }

        .topic-item.active .topic-name {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .topic-name {
            font-size: 0.95rem;
            color: var(--text-secondary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            opacity: 0;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s, opacity 0.2s;
        }

        .topic-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: var(--warning-orange);
        }

        /* --- Main Workspace (Intelligence Stream) --- */
        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(108, 92, 231, 0.05), transparent 50%),
                        radial-gradient(circle at bottom left, rgba(0, 206, 201, 0.03), transparent 50%);
            position: relative;
        }

        .workspace-header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(21, 24, 33, 0.4);
            backdrop-filter: blur(10px);
            z-index: 5;
        }

        .workspace-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .status-msg {
            font-size: 0.85rem;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--accent-cyan);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .alpha-grid {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            grid-auto-rows: max-content;
            gap: 24px;
            align-items: start;
        }

        /* Scrollbar for grid */
        .alpha-grid::-webkit-scrollbar { width: 8px; }
        .alpha-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px;}

        /* --- Intelligence Card --- */
        .alpha-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .alpha-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .badget {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-tier1 {
            background: var(--accent-cyan-glow);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 206, 201, 0.3);
        }
        
        .badge-unverified {
            background: rgba(225, 112, 85, 0.1);
            color: var(--warning-orange);
            border: 1px solid rgba(225, 112, 85, 0.3);
        }

        .badge-temporal {
            background: rgba(255,255,255,0.05);
            color: #888;
            border: 1px dashed rgba(255,255,255,0.2);
        }

        .fact-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #ececec;
            font-weight: 400;
            
            /* Logic for Read More expansion */
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
            transition: color 0.2s;
        }

        .fact-text:hover {
            color: white;
        }

        .fact-text.expanded {
            -webkit-line-clamp: unset;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 16px;
            margin-top: auto;
        }

        .source-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .source-link:hover {
            color: var(--accent-cyan);
        }

        .source-link svg {
            width: 14px;
            height: 14px;
            margin-right: 6px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <!-- Left Sidebar Control Center -->
    <aside class="sidebar">
        <div class="brand">
            <h1>TrueBrief</h1>
            <div class="subtitle">Delta Intelligence Engine</div>
        </div>

        <div class="input-group">
            <input type="text" id="feedUrl" placeholder="Enter topic (e.g. Nvidia)...">
            <button class="scan-btn" onclick="addTopic()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                Launch Operation
            </button>
        </div>

        <div class="section-title">Active Operations</div>
        <div class="topics-list" id="topics-list">
            <!-- Topic Items Injected Here -->
        </div>
    </aside>

    <!-- Main Workspace -->
    <main class="main-workspace">
        <header class="workspace-header">
            <div class="workspace-title" id="workspace-title">Global Stream</div>
            <div id="status" class="status-msg"></div>
        </header>
        
        <div class="alpha-grid" id="grid">
            <!-- Cards Injected Here -->
        </div>
    </main>

    <script>
        const API_BASE = "http://localhost:8000";
        let activeFilter = null;

        // Automatically load on start
        window.onload = () => {
            loadTopics();
            loadAlphas();
        };

        async function loadAlphas(topic = null) {
            // Un-toggle if clicking the active filter
            if (activeFilter === topic && topic !== null) {
                topic = null;
            }
            activeFilter = topic;
            
            // Update Title
            const titleEl = document.getElementById('workspace-title');
            titleEl.innerText = activeFilter ? `Operation: ${activeFilter}` : "Global Stream";

            // Update UI Sidebar Selected State
            document.querySelectorAll('.topic-item').forEach(item => {
                if (item.dataset.topic === activeFilter) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            try {
                let url = `${API_BASE}/alphas`;
                if (topic) {
                    url += `?topic=${encodeURIComponent(topic)}`;
                }
                const res = await fetch(url);
                const data = await res.json();
                renderCards(data.alphas, topic);
            } catch (e) {
                console.error("Failed to load alphas", e);
            }
        }

        async function loadTopics() {
            try {
                const res = await fetch(`${API_BASE}/topics`);
                const data = await res.json();
                renderTopics(data.topics);
            } catch (e) {
                console.error("Failed to load topics", e);
            }
        }

        function renderTopics(topics) {
            const list = document.getElementById('topics-list');
            list.innerHTML = "";
            topics.forEach(t => {
                const item = document.createElement('div');
                item.className = 'topic-item';
                if (t.name === activeFilter) item.classList.add('active');
                item.dataset.topic = t.name;
                
                item.innerHTML = `
                    <div class="topic-name" title="${t.name}">📡 ${t.name}</div>
                    <button class="delete-btn" title="Terminate Operation">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                `;
                
                // Add event listeners securely to avoid quote-injection syntax errors
                const delBtn = item.querySelector('.delete-btn');
                delBtn.addEventListener('click', async (e) => {
                    e.stopPropagation(); // Stop from clicking the topic chip behind it
                    // Directly execute delete to avoid browser popup blockers
                    await executeDeleteTopic(t.name);
                });
                
                item.addEventListener('click', (e) => {
                    if(!e.target.closest('.delete-btn')) {
                        loadAlphas(t.name);
                    }
                });
                
                list.appendChild(item);
            });
        }

        async function executeDeleteTopic(topicName) {
            try {
                // Instantly update UI for snappy feel
                document.getElementById('workspace-title').innerText = "Terminating...";
                
                await fetch(`${API_BASE}/topics/${encodeURIComponent(topicName)}`, {
                    method: 'DELETE'
                });
                if (activeFilter === topicName) {
                    await loadAlphas(null);
                } else {
                    await loadAlphas(activeFilter); 
                }
                await loadTopics();
            } catch (e) {
                console.error('Delete failed:', e);
            }
        }

        function renderCards(alphas, filterName) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            
            if (alphas.length === 0) {
                grid.innerHTML = `<div class="empty-state">No intelligence found ${filterName ? `for '${filterName}'` : 'yet'}.<br>Operations take time to surface verified Alphas.</div>`;
                return;
            }

            // Reverse to show newest first
            [...alphas].reverse().forEach(item => {
                const text = item.text || "";
                let source = item.source || "#";
                
                // Temporal Meta
                const start_date = item.start_date || "";
                const end_date = item.end_date || "";
                const human_time = item.human_readable || item.published_date || "Live Data";
                const isTemporal = (start_date && end_date) ? `Active: ${start_date} to ${end_date}` : "";

                // Truncate Source
                let displaySource = source.replace(/https?:\/\/(www\.)?/, '').split('/')[0];
                if (displaySource.length > 30) displaySource = displaySource.substring(0, 30) + '...';
                
                // Tier 1 Trust Badge Logic
                const tier1Domains = ["reuters.com", "bloomberg.com", "wsj.com", "ft.com", "sec.gov", "apnews.com"];
                const isTier1 = tier1Domains.some(d => source.includes(d));
                const trustBadge = isTier1 
                    ? `<span class="badget badge-tier1">✓ Verified Tier-1</span>` 
                    : `<span class="badget badge-unverified">! Unverified Source</span>`;

                const card = document.createElement('div');
                card.className = 'alpha-card';
                card.innerHTML = `
                    <div class="card-header">
                        ${trustBadge}
                        <span class="badget badge-temporal" title="${isTemporal}">🕒 ${human_time}</span>
                    </div>
                    
                    <div class="fact-text" onclick="this.classList.toggle('expanded')" title="Click to Expand">
                        ${text}
                    </div>
                    
                    <div class="card-footer">
                        <a href="${source}" target="_blank" class="source-link">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                            ${displaySource}
                        </a>
                        ${item.topic_name ? `<span style="font-size:0.75rem; color:var(--text-secondary)">📁 ${item.topic_name}</span>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function addTopic() {
            const btn = document.querySelector('.scan-btn');
            const status = document.getElementById('status');
            const urlInput = document.getElementById('feedUrl');

            const topicName = urlInput.value.trim();
            if (!topicName) return;

            btn.disabled = true;
            status.innerHTML = '<span class="spinner"></span> <span>Librarian scouting sources...</span>';

            try {
                const res = await fetch(`${API_BASE}/topics`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: topicName })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                     throw new Error(data.detail || "Operation Failed");
                }
                
                urlInput.value = "";
                
                await loadTopics(); // Refresh list to show the new topic
                
                // Switch focus to the new operation
                await loadAlphas(data.topic.name);

                // Start Polling
                pollForUpdates(data.topic.name);

            } catch (e) {
                status.innerHTML = `<span style="color: var(--warning-orange)">Error: ${e.message}</span>`;
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }

        async function pollForUpdates(topicName) {
            const status = document.getElementById('status');
            let attempts = 0;
            const maxAttempts = 15; // 45 seconds

            const interval = setInterval(async () => {
                attempts++;
                if (attempts > maxAttempts) {
                    clearInterval(interval);
                    status.innerHTML = `<span style="color:var(--text-secondary)">Scanning suspended. Awaiting manager hook.</span>`;
                    return;
                }
                
                status.innerHTML = `<span class="spinner"></span> <span>Scanning '${topicName}' (${attempts * 3}s)...</span>`;
                
                // Only refresh feed if they are still looking at this topic or global view
                if (activeFilter === topicName || activeFilter === null) {
                    await loadAlphas(activeFilter);
                }
            }, 3000);
        }
    </script>
</body>
</html>
