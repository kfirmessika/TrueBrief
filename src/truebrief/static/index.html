<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Engine | TrueBrief</title>
    <style>
        :root {
            --bg: #0f1115;
            --surface: #181b21;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --success: #00cec9;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -0.05em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* --- Search Bar --- */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            position: relative;
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: var(--surface);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 12px 16px;
            outline: none;
        }

        button.scan-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button.scan-btn:hover {
            background: #5b4cc4;
            transform: translateY(-1px);
        }

        button.scan-btn:active {
            transform: translateY(1px);
        }

        button.scan-btn:disabled {
            background: var(--surface);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        /* --- Topics Grid --- */
        .topics-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 50px;
        }

        .section-title {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 0.1em;
        }

        .topics-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .topic-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .topic-chip:hover {
            background: rgba(108, 92, 231, 0.1);
            color: var(--accent);
            border-color: var(--accent);
        }

        .topic-count {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.7rem;
        }

        /* --- Grid Layout --- */
        .alpha-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* --- Intelligence Card --- */
        .alpha-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .alpha-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .alpha-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--success));
            opacity: 0.7;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .badget {
            background: rgba(108, 92, 231, 0.1);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .fact-text {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #ececec;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .source-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .source-link:hover {
            color: var(--success);
        }

        .source-link svg {
            width: 14px;
            height: 14px;
            margin-right: 6px;
        }

        /* --- Loading State --- */
        .status-msg {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            min-height: 20px;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--text-secondary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>TrueBrief</h1>
        <div class="subtitle">Delta Engine | Intelligence Stream</div>
    </header>

    <div class="search-container">
        <div class="input-group">
            <input type="text" id="feedUrl" placeholder="Add Surveillance Target (e.g. Nvidia, Bitcoin)...">
            <button class="scan-btn" onclick="addTopic()">ADD TARGET</button>
        </div>
        <div id="status" class="status-msg"></div>
    </div>

    <div class="topics-container">
        <div class="section-title">Active Surveillance Targets</div>
        <div id="topics-grid" class="topics-grid">
            <!-- Topics injected here -->
        </div>
    </div>

    <div id="grid" class="alpha-grid">
        <!-- Cards injected here -->
    </div>

    <script>
        const API_BASE = "http://localhost:8000";

        async function loadAlphas() {
            try {
                const res = await fetch(`${API_BASE}/alphas`);
                const data = await res.json();
                renderCards(data.alphas);
            } catch (e) {
                console.error("Failed to load alphas", e);
            }
        }

        async function loadTopics() {
            try {
                const res = await fetch(`${API_BASE}/topics`);
                const data = await res.json();
                renderTopics(data.topics);
            } catch (e) {
                console.error("Failed to load topics", e);
            }
        }

        function renderTopics(topics) {
            const grid = document.getElementById('topics-grid');
            grid.innerHTML = "";
            topics.forEach(t => {
                const chip = document.createElement('div');
                chip.className = 'topic-chip';
                // Count sources
                const count = (t.sources.rss.length + t.sources.static.length);
                chip.innerHTML = `${t.name} <span class="topic-count">${count}</span>`;
                grid.appendChild(chip);
            });
        }

        function renderCards(alphas) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            // Reverse to show newest first
            [...alphas].reverse().forEach(item => {
                const text = item.payload.text;
                let source = item.payload.source || "#";

                // Truncate Source for display
                let displaySource = source.replace(/https?:\/\/(www\.)?/, '').split('/')[0];
                if (displaySource.length > 30) displaySource = displaySource.substring(0, 30) + '...';

                const card = document.createElement('div');
                card.className = 'alpha-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="badget">Verified Alpha</span>
                        <span class="badget" style="background:rgba(255,255,255,0.05); color: #888;">${new Date().toLocaleDateString()}</span>
                    </div>
                    <div class="fact-text">${text}</div>
                    <a href="${source}" target="_blank" class="source-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        ${displaySource}
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        async function addTopic() {
            const btn = document.querySelector('.scan-btn');
            const status = document.getElementById('status');
            const urlInput = document.getElementById('feedUrl');

            const topicName = urlInput.value.trim();
            if (!topicName) return;

            btn.disabled = true;
            btn.innerText = "Researching...";
            status.innerHTML = '<span class="spinner"></span> Librarian is scouting sources...';

            try {
                const res = await fetch(`${API_BASE}/topics`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: topicName })
                });
                const data = await res.json();

                status.innerText = `Topic Added. Found sources for ${data.topic.name}. Scanning for Intel...`;
                urlInput.value = "";
                loadTopics(); // Refresh list

                // Start Polling for results
                pollForUpdates(data.topic.name);

            } catch (e) {
                status.innerText = "Error: Connection Failed (Check Server Logs)";
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "ADD TARGET";
            }
        }

        async function pollForUpdates(topicName) {
            const status = document.getElementById('status');
            let attempts = 0;
            const maxAttempts = 15; // 45 seconds

            const interval = setInterval(async () => {
                attempts++;
                if (attempts > maxAttempts) {
                    clearInterval(interval);
                    status.innerText = "Scan finished. Check results below.";
                    return;
                }

                status.innerHTML = `<span class="spinner"></span> Scanning ${topicName}... (${attempts * 3}s)`;
                await loadAlphas();

            }, 3000);
        }

        // Initial Load
        loadAlphas();
        loadTopics();
    </script>
</body>

</html>
